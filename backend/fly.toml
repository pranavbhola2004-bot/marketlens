# fly.toml — optional Fly.io backend deploy (run from backend/)
app = "marketlens-api"
primary_region = "sin"

[build]

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[processes]
  app = "uvicorn main:app --host 0.0.0.0 --port 8000"
